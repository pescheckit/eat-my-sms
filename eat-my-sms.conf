[DEFAULT]
pin = 0000
poll_interval = 5

webhook_url = https://example.com/webhook
# Add a static value to the 'extra' field in every webhook payload
# webhook_extra = production

# Optional: SMS read storage. MT = combined ME+SIM (default, recommended),
# SM = SIM only, ME = modem memory only.
# MT reads from both regardless of where the modem stores incoming SMS.
# Use SM or ME only if you need to constrain storage on a specific modem.
# sms_storage = MT

# Override settings for specific devices
# [ttyUSB0]
# poll_interval = 3
# webhook_url = https://example.com/other-webhook
# metrics_port = 8080
