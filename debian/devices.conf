# Configuration for eat-my-sms device auto-detection
# This file is sourced by /usr/bin/eat-my-sms-start-all.

# Maximum number of devices to start (default: 8)
MAX_DEVICES=8

# Device pattern to search for.
# Default is ttyACM* — arm64 hardware (Raspberry Pi + direct USB modems)
# enumerates as /dev/ttyACM*. Override to ttyUSB* for serial/USB-hub setups.
# Examples:
#   DEVICE_PATTERN="ttyACM*"        # Direct USB modems (default)
#   DEVICE_PATTERN="ttyUSB*"        # USB hubs / serial converters
#   DEVICE_PATTERN="tty{USB,ACM}*"  # Both
DEVICE_PATTERN="ttyACM*"
