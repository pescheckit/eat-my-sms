stages:
  - build
  - test
  - deploy

.build: &build
  image: debian
  stage: build
  script:
    - apt update && apt install -y debhelper-compat config-package-dev python3-pip git-buildpackage $EXTRA_PKG
    # Auto-generate changelog from git commits using gbp dch
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        VERSION=${CI_COMMIT_TAG#v}  # Remove 'v' prefix from tag
        export DEBEMAIL="gitlab-ci@pescheck.io"
        export DEBFULLNAME="GitLab CI"

        # Create a temporary branch for gbp dch (it requires being on a branch)
        git checkout -b temp-build-branch

        # Use gbp dch to automatically generate changelog from git commits
        gbp dch --new-version="$VERSION" \
                --distribution=unstable \
                --release \
                --ignore-branch \
                --spawn-editor=never
      fi
    - dpkg-buildpackage -uc -us --host-arch $ARCH
    - mv ../*.deb ./
  artifacts:
    paths:
      - "*.deb"

build-amd64:
  <<: *build
  variables:
    ARCH: amd64

build-arm64:
  <<: *build
  variables:
    ARCH: arm64
    EXTRA_PKG: binutils-aarch64-linux-gnu

test-install:
  image: debian:testing
  stage: test
  dependencies:
    - build-amd64
  before_script:
    - apt update && apt install -y gnokii-cli python3 openssl systemd-standalone-sysusers systemd
  script:
    # Inspect package contents before installing. The 1.1.5 packaging bug
    # produced directories where files were expected; these greps fail loudly
    # if the same regression happens again.
    - dpkg -c eat-my-sms_*_amd64.deb | tee /tmp/contents.txt
    - grep -E ' \./usr/bin/eat-my-sms-start-all$' /tmp/contents.txt
    - grep -E ' \./etc/eat-my-sms/devices\.conf$' /tmp/contents.txt
    - "! grep -E '^d.* \\./usr/bin/eat-my-sms-start-all/?$' /tmp/contents.txt"
    - "! grep -E '^d.* \\./etc/eat-my-sms/devices\\.conf/?$' /tmp/contents.txt"
    - dpkg -i eat-my-sms_*_amd64.deb
    # Verify the on-disk layout the units actually depend on.
    - test -f /usr/bin/eat-my-sms-start-all && test -x /usr/bin/eat-my-sms-start-all
    - test -f /etc/eat-my-sms/devices.conf
    - test -f /etc/eat-my-sms/eat-my-sms.conf
    - test -f /usr/share/eat-my-sms/eat-my-sms.py
    - |
      for unit in /usr/lib/systemd/system/eat-my-sms*.service; do
        grep -h '^ExecStart=' "$unit" \
          | sed 's/^ExecStart=-\?//' \
          | awk '{print $1}' \
          | while read -r bin; do
              if [ ! -x "$bin" ]; then
                echo "Missing or non-exec ExecStart binary: $bin (from $unit)" >&2
                exit 1
              fi
            done
      done
    - systemd-analyze verify /usr/lib/systemd/system/eat-my-sms*.service || true

# Upload Debian packages to GitLab Package Registry
deploy-packages:
  stage: deploy
  image: curlimages/curl:latest
  dependencies:
    - build-amd64
    - build-arm64
  script:
    # Upload packages using generic package repository (Debian registry requires premium)
    - |
      for DEB in *.deb; do
        # Extract version and architecture from filename
        VERSION=$(echo $DEB | sed -E 's/.*_([0-9]+\.[0-9]+\.[0-9]+)_.*/\1/')
        ARCH=$(echo $DEB | sed -E 's/.*_([^_]+)\.deb$/\1/')
        echo "Uploading $DEB (version: $VERSION, arch: $ARCH)..."

        curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
             --upload-file ${DEB} \
             "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/eat-my-sms/${VERSION}/${DEB}"
      done
  rules:
    - if: $CI_COMMIT_TAG  # Only upload on tagged releases
